version: '3.8'
services:
  tva-mcp:
    build:
      context: ./mcp-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./mcp-backend/.env
    environment:
      - FASTMCP_HOST=0.0.0.0
      - FASTMCP_PORT=8000
      - FASTMCP_SCHEME=http
      - MCP_REQUIRE_AUTH=false
      - MCP_PRM_METADATA_PATH=prm_metadata.json
      - MCP_SESSION_TOKEN_TTL_SECONDS=3600
      - OAUTH_TIMEOUT_SECONDS=900
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/.well-known/oauth-protected-resource"]
      interval: 10s
      timeout: 5s
      retries: 5
